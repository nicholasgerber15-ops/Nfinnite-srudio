apiVersion: v1
kind: Namespace
metadata:
  name: nfinnite
  labels:
    name: nfinnite

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nfinnite-config
  namespace: nfinnite
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3000"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "nfinnite"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: nfinnite-secrets
  namespace: nfinnite
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  DB_USER: "postgres"
  DB_PASSWORD: "${DB_PASSWORD}"
  API_KEY_SECRET: "${API_KEY_SECRET}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfinnite-api
  namespace: nfinnite
  labels:
    app: nfinnite-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nfinnite-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nfinnite-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - nfinnite-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: ghcr.io/nicholasgerber15-ops/nfinnite-srudio:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nfinnite-config
            - secretRef:
                name: nfinnite-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: nfinnite-api
  namespace: nfinnite
  labels:
    app: nfinnite-api
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: nfinnite-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nfinnite-api-hpa
  namespace: nfinnite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nfinnite-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nfinnite-api-pdb
  namespace: nfinnite
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: nfinnite-api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nfinnite-api
  namespace: nfinnite

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nfinnite-api
  namespace: nfinnite
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nfinnite-api
  namespace: nfinnite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nfinnite-api
subjects:
  - kind: ServiceAccount
    name: nfinnite-api
    namespace: nfinnite

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nfinnite-api
  namespace: nfinnite
spec:
  podSelector:
    matchLabels:
      app: nfinnite-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
